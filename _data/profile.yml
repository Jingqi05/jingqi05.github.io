short_bio: >-
  <p>
    我是天津中德应用技术大学信息安全专业的本科生，专注于物联网安全与嵌入式系统开发。
    研究兴趣包括嵌入式密码学、物联网门禁系统、国密算法（SM2/SM3/SM4）应用，
    以及车联网轻量级身份认证协议的设计与安全分析。
  </p>

  <p>
    我主导开发了一套基于 STM32 + ESP32 的智能门禁系统，
    集成 ECDH 密钥协商、SM4-CTR 加密通信、SM3-HMAC 完整性校验等密码学机制，
    实现了从嵌入式固件到云端服务器的全链路安全通信。
    同时在车联网安全领域，研究轻量级身份认证协议的设计与形式化验证。
  </p>

  <p>
    技术栈：C/C++（STM32 HAL、ESP-IDF）、Python、国密算法（GmSSL）、
    FreeRTOS、MQTT/TCP 协议、PlatformIO/CMake 构建系统。
  </p>


